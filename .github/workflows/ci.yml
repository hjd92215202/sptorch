name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --exclude sptorch-runtime-cuda --exclude sptorch-cli-train-gpu --exclude sptorch-distributed --exclude sptorch-mock-npu -- -D warnings
      - name: Build mock-npu
        run: cargo build -p sptorch-mock-npu
      - name: Test
        run: cargo test --workspace --exclude sptorch-runtime-cuda --exclude sptorch-cli-train-gpu --exclude sptorch-distributed
