name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --exclude runtime-cuda --exclude cli-train-gpu --exclude distributed --exclude mock-npu -- -D warnings
      - name: Build mock-npu
        run: cargo build -p mock-npu
      - name: Test
        run: cargo test --workspace --exclude runtime-cuda --exclude cli-train-gpu --exclude distributed

  product-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Product tests
        run: cargo test --manifest-path products/Cargo.toml --workspace

  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: studio
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: studio/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Frontend tests (Vitest)
        run: npm run test
